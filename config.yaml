name: Hermes Agent
description: >-
  Nous Research hermes-agent — the self-improving AI agent with built-in
  terminal, file ops, web search, memory, skills, and cross-session recall.
  This workspace runs the real `hermes-agent` (github.com/NousResearch/hermes-agent)
  behind an A2A bridge. The agent exposes its OpenAI-compatible API on
  localhost:8642 and molecule_runtime proxies messages to it on :8000.

  Supports every provider hermes-agent supports — see docs/CONFIGURATION.md
  for the full list. Any model hermes-agent accepts is selectable at
  runtime via `hermes model`, or from the canvas Config tab.
version: 2.1.0
tier: 2

# Provider registry — declarative SSOT for the model-slug-prefix →
# hermes-agent provider mapping. The authoritative runtime derivation
# lives in scripts/derive-provider.sh (sourced by both install.sh and
# start.sh), and this block mirrors that taxonomy 1:1 so workspace-server
# (cp#220 hard-gate) and the canvas Config tab can validate / surface
# providers without scraping the shell script.
#
# Adding a new provider here = also add the matching `case` arm to
# scripts/derive-provider.sh, and (if cp#220 v1 still applies) extend
# KnownProviderNames() in molecule-controlplane userdata_containerized.go.
# Track that under SSOT audit comment 40629 finding #4.
#
# Schema per entry (subset of claude-code template's richer schema —
# hermes-agent owns the model registry, so we don't enumerate model
# aliases here):
#   name           : provider name as hermes-agent expects it
#                    (HERMES_INFERENCE_PROVIDER value)
#   model_prefixes : model-slug prefixes that route to this provider
#                    (matches derive-provider.sh case arms)
#   base_url       : default upstream endpoint hermes-agent uses; null
#                    when the provider owns its endpoint internally or
#                    requires per-workspace configuration (custom, lmstudio).
#   auth_env       : env vars that satisfy auth; ANY ONE being set is
#                    sufficient (OR-semantics; mirrors hermes-agent
#                    behaviour where its provider auto-resolves the key)
#   notes          : (optional) free-text disambiguation for operator docs
providers:
  # ── Molecule platform-managed (no tenant key; platform owns billing) ──
  - name: platform
    model_prefixes: [platform/, moonshot/]
    base_url: https://api.moleculesai.app/api/v1/internal/llm/openai/v1
    auth_env: [MOLECULE_LLM_USAGE_TOKEN, ANTHROPIC_API_KEY]
    notes: >-
      Molecule platform-managed LLM proxy (OpenAI-compat /chat/completions
      surface). Auto-selected when the workspace LLM billing mode is
      platform_managed; start.sh routes hermes-agent's `custom` provider
      here via scripts/derive-platform-llm.sh. Kimi is hermes's native
      platform model family — see the `provider: platform` entries in
      runtime_config.models. The live base_url + bearer token are injected
      at boot as MOLECULE_LLM_BASE_URL + MOLECULE_LLM_USAGE_TOKEN; the value
      here documents the contract for the canvas/UI.

  # ── Direct-SDK providers (1:1 prefix → provider) ──────────────────
  - name: nous
    model_prefixes: [nousresearch/]
    base_url: https://inference-api.nousresearch.com/v1
    auth_env: [HERMES_API_KEY, NOUS_API_KEY]
    notes: >-
      Nous Portal — direct path for Hermes 4 family. Falls back to
      `openrouter` when neither HERMES_API_KEY nor NOUS_API_KEY is set
      (see derive-provider.sh `nousresearch/*` arm).

  - name: openrouter
    model_prefixes: [openrouter/, nousresearch/, openai/]
    base_url: https://openrouter.ai/api/v1
    auth_env: [OPENROUTER_API_KEY]
    notes: >-
      Catch-all gateway. Also the fallback for `openai/*` slugs when
      OPENAI_API_KEY is not set (hermes has no native `openai` provider —
      see derive-provider.sh `openai/*` arm), and for `nousresearch/*`
      when no Nous key is present.

  - name: anthropic
    model_prefixes: [anthropic/]
    base_url: https://api.anthropic.com
    auth_env: [ANTHROPIC_API_KEY]

  - name: gemini
    model_prefixes: [gemini/]
    base_url: https://generativelanguage.googleapis.com
    auth_env: [GEMINI_API_KEY]

  - name: deepseek
    model_prefixes: [deepseek/]
    base_url: https://api.deepseek.com
    auth_env: [DEEPSEEK_API_KEY]

  - name: zai
    model_prefixes: [zai/]
    base_url: https://api.z.ai/api/anthropic
    auth_env: [GLM_API_KEY, ZAI_API_KEY]

  - name: kimi-coding
    model_prefixes: [kimi-coding/]
    base_url: https://api.kimi.com/coding/
    auth_env: [KIMI_API_KEY]
    notes: >-
      Moonshot's Kimi-For-Coding gateway. Chinese-region variant
      `kimi-coding-cn` keeps its full prefix as the provider name.

  - name: kimi-coding-cn
    model_prefixes: [kimi-coding-cn/]
    base_url: https://api.kimi.cn/coding/
    auth_env: [KIMI_API_KEY, KIMI_CN_API_KEY]

  - name: minimax
    model_prefixes: [minimax/]
    base_url: https://api.minimax.io/v1
    auth_env: [MINIMAX_API_KEY]

  - name: minimax-cn
    model_prefixes: [minimax-cn/]
    base_url: https://api.minimaxi.com/v1
    auth_env: [MINIMAX_CN_API_KEY, MINIMAX_API_KEY]

  - name: alibaba
    model_prefixes: [alibaba/, dashscope/, qwen/]
    base_url: https://dashscope.aliyuncs.com
    auth_env: [DASHSCOPE_API_KEY]

  - name: xiaomi
    model_prefixes: [xiaomi/, mimo/]
    base_url: https://api.xiaomimimo.com
    auth_env: [XIAOMI_API_KEY]

  - name: arcee
    model_prefixes: [arcee/, arcee-ai/]
    base_url: https://api.arcee.ai
    auth_env: [ARCEEAI_API_KEY]

  - name: nvidia
    model_prefixes: [nvidia/, nim/]
    base_url: https://integrate.api.nvidia.com/v1
    auth_env: [NVIDIA_API_KEY]

  - name: ollama-cloud
    model_prefixes: [ollama-cloud/]
    base_url: https://ollama.com/api
    auth_env: [OLLAMA_API_KEY]

  - name: huggingface
    model_prefixes: [huggingface/, hf/]
    base_url: https://api-inference.huggingface.co
    auth_env: [HF_TOKEN]

  - name: ai-gateway
    model_prefixes: [ai-gateway/, aigateway/]
    base_url: https://ai-gateway.vercel.sh/v1
    auth_env: [AI_GATEWAY_API_KEY]

  - name: kilocode
    model_prefixes: [kilocode/]
    base_url: null
    auth_env: [KILOCODE_API_KEY]

  - name: opencode-zen
    model_prefixes: [opencode-zen/]
    base_url: null
    auth_env: [OPENCODE_ZEN_API_KEY]

  - name: opencode-go
    model_prefixes: [opencode-go/]
    base_url: null
    auth_env: [OPENCODE_GO_API_KEY]

  - name: xai
    model_prefixes: [xai/, grok/]
    base_url: https://api.x.ai/v1
    auth_env: [XAI_API_KEY]

  - name: bedrock
    model_prefixes: [bedrock/, aws/]
    base_url: null
    auth_env: [AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN]
    notes: SigV4 — uses the standard AWS credential chain.

  - name: tencent-tokenhub
    model_prefixes: [tencent/, tencent-tokenhub/]
    base_url: https://api.tokenhub.tencentcloudapi.com
    auth_env: [TENCENT_API_KEY]

  - name: gmi
    model_prefixes: [gmi/]
    base_url: null
    auth_env: [GMI_API_KEY]

  # ── OAuth-based providers (hermes-agent owns the OAuth flow; no
  #    base_url enforced by the template) ──────────────────────────
  - name: openai-codex
    model_prefixes: [openai-codex/]
    base_url: null
    auth_env: []
    notes: OAuth-only (Codex models). hermes-agent owns the device-code flow.

  - name: qwen-oauth
    model_prefixes: [qwen-oauth/]
    base_url: null
    auth_env: []

  - name: minimax-oauth
    model_prefixes: [minimax-oauth/]
    base_url: null
    auth_env: []

  - name: alibaba-coding-plan
    model_prefixes: [alibaba-coding-plan/]
    base_url: null
    auth_env: []

  - name: google-gemini-cli
    model_prefixes: [google-gemini-cli/]
    base_url: null
    auth_env: []

  - name: copilot-acp
    model_prefixes: [copilot-acp/]
    base_url: null
    auth_env: []

  - name: copilot
    model_prefixes: [copilot/]
    base_url: null
    auth_env: []

  # ── Self-hosted / local catch-alls ─────────────────────────────────
  - name: custom
    model_prefixes: [custom/]
    base_url: null
    auth_env: [HERMES_CUSTOM_API_KEY, OPENAI_API_KEY]
    notes: >-
      Self-hosted OpenAI-compat endpoint. Per derive-provider.sh, an
      `openai/*` slug WITH OPENAI_API_KEY present routes through `custom`
      pointed at api.openai.com (install.sh auto-populates
      HERMES_CUSTOM_BASE_URL + HERMES_CUSTOM_API_KEY).

  - name: lmstudio
    model_prefixes: [lmstudio/, lm-studio/]
    base_url: null
    auth_env: []
    notes: Local LM Studio endpoint; base_url configured per-workspace.

runtime: hermes
runtime_config:
  # Default model. hermes-agent owns provider resolution via the
  # HERMES_INFERENCE_PROVIDER env or its own `hermes model` wizard.
  # Override per-workspace in the canvas Config tab.
  model: nousresearch/hermes-4-70b

  # Canvas surfaces this list as a Model dropdown and auto-populates
  # Required Env Vars from the selected entry's required_env. Provider
  # names in parentheses mirror hermes-agent's CLI provider field; see
  # docs/CONFIGURATION.md#provider-matrix for the full mapping.
  models:
    # ── Nous Research (Hermes 4) via Nous Portal ──────────────────────
    - id: nousresearch/hermes-4-70b
      name: Hermes 4 70B (Nous Portal)
      required_env: [HERMES_API_KEY]
    - id: nousresearch/hermes-4-405b
      name: Hermes 4 405B (Nous Portal)
      required_env: [HERMES_API_KEY]
    - id: nousresearch/hermes-4-14b
      name: Hermes 4 14B (Nous Portal)
      required_env: [HERMES_API_KEY]

    # ── Hermes 3 family (via OpenRouter) ─────────────────────────────
    - id: nousresearch/hermes-3-llama-3.1-70b
      name: Hermes 3 70B (OpenRouter)
      required_env: [OPENROUTER_API_KEY]
    - id: nousresearch/hermes-3-llama-3.1-405b
      name: Hermes 3 405B (OpenRouter)
      required_env: [OPENROUTER_API_KEY]

    # ── Anthropic (native SDK inside hermes-agent) ────────────────────
    - id: anthropic/claude-sonnet-4-5
      name: Claude Sonnet 4.5 (direct)
      required_env: [ANTHROPIC_API_KEY]
    - id: anthropic/claude-opus-4-1
      name: Claude Opus 4.1 (direct)
      required_env: [ANTHROPIC_API_KEY]
    - id: anthropic/claude-haiku-4-5
      name: Claude Haiku 4.5 (direct)
      required_env: [ANTHROPIC_API_KEY]

    # ── OpenAI (via OpenRouter — hermes has no direct openai provider;
    #    openai-codex is OAuth-only for Codex models) ──────────────────
    - id: openai/gpt-5
      name: GPT-5 (via OpenRouter)
      required_env: [OPENROUTER_API_KEY]
    - id: openai/gpt-5-mini
      name: GPT-5 mini (via OpenRouter)
      required_env: [OPENROUTER_API_KEY]
    - id: openai/gpt-4o
      name: GPT-4o (via OpenRouter)
      required_env: [OPENROUTER_API_KEY]
    - id: openai/gpt-4o-mini
      name: GPT-4o mini (via OpenRouter)
      required_env: [OPENROUTER_API_KEY]

    # ── Google Gemini (native SDK) ────────────────────────────────────
    - id: gemini/gemini-2.5-pro
      name: Gemini 2.5 Pro (direct)
      required_env: [GEMINI_API_KEY]
    - id: gemini/gemini-2.5-flash
      name: Gemini 2.5 Flash (direct)
      required_env: [GEMINI_API_KEY]

    # ── DeepSeek (direct) ─────────────────────────────────────────────
    - id: deepseek/deepseek-v3.2
      name: DeepSeek V3.2 (direct)
      required_env: [DEEPSEEK_API_KEY]
    - id: deepseek/deepseek-r1
      name: DeepSeek R1 reasoning (direct)
      required_env: [DEEPSEEK_API_KEY]

    # ── z.ai / GLM ────────────────────────────────────────────────────
    - id: zai/glm-4.6
      name: GLM 4.6 (z.ai)
      required_env: [GLM_API_KEY]

    # ── Molecule platform-managed (no API key — platform owns billing) ──
    # Hermes's native platform family is Kimi. Offered only when the
    # workspace runs in platform_managed LLM billing; start.sh routes these
    # through the platform proxy's OpenAI-compat surface
    # (scripts/derive-platform-llm.sh). Model ids match the proven proxy
    # smoke (molecule-controlplane/scripts/e2e-llm-kimi-smoke.sh).
    - id: moonshot/kimi-k2.6
      name: Kimi K2.6 (Molecule platform)
      provider: platform
      required_env: []
    - id: moonshot/kimi-k2.5
      name: Kimi K2.5 (Molecule platform)
      provider: platform
      required_env: []

    # ── Kimi / Moonshot ───────────────────────────────────────────────
    - id: kimi-coding/kimi-k2
      name: Kimi K2 (Moonshot)
      required_env: [KIMI_API_KEY]

    # ── MiniMax (global + China) ─────────────────────────────────────
    - id: minimax/MiniMax-M2.7
      name: MiniMax M2.7 (direct, coding-tuned)
      required_env: [MINIMAX_API_KEY]
    - id: minimax/MiniMax-M2.7-highspeed
      name: MiniMax M2.7 highspeed (Token Plan only)
      required_env: [MINIMAX_API_KEY]
    - id: minimax/MiniMax-M1
      name: MiniMax M1 (1M ctx)
      required_env: [MINIMAX_API_KEY]
    - id: minimax-cn/abab6.5-chat
      name: MiniMax China (abab6.5)
      required_env: [MINIMAX_CN_API_KEY]

    # ── Alibaba Cloud / Qwen (DashScope) ─────────────────────────────
    - id: alibaba/qwen3-max
      name: Qwen 3 Max (Alibaba Cloud)
      required_env: [DASHSCOPE_API_KEY]
    - id: alibaba/qwen3-coder
      name: Qwen 3 Coder (Alibaba Cloud)
      required_env: [DASHSCOPE_API_KEY]

    # ── Xiaomi MiMo ──────────────────────────────────────────────────
    - id: xiaomi/mimo-v1
      name: Xiaomi MiMo v1
      required_env: [XIAOMI_API_KEY]

    # ── Arcee Trinity ────────────────────────────────────────────────
    - id: arcee/trinity-70b
      name: Arcee Trinity 70B
      required_env: [ARCEEAI_API_KEY]

    # ── NVIDIA NIM ────────────────────────────────────────────────────
    - id: nvidia/nemotron-70b
      name: Nemotron 70B (NVIDIA NIM)
      required_env: [NVIDIA_API_KEY]

    # ── Ollama Cloud ─────────────────────────────────────────────────
    - id: ollama-cloud/llama-3.3-70b
      name: Llama 3.3 70B (Ollama Cloud)
      required_env: [OLLAMA_API_KEY]

    # ── Hugging Face Inference ───────────────────────────────────────
    - id: huggingface/*
      name: Any Hugging Face model (set ID per workspace)
      required_env: [HF_TOKEN]

    # ── Vercel AI Gateway ────────────────────────────────────────────
    - id: ai-gateway/*
      name: Any Vercel AI Gateway model
      required_env: [AI_GATEWAY_API_KEY]

    # ── OpenCode Zen / Go ────────────────────────────────────────────
    - id: opencode-zen/*
      name: OpenCode Zen (set model per workspace)
      required_env: [OPENCODE_ZEN_API_KEY]
    - id: opencode-go/*
      name: OpenCode Go (set model per workspace)
      required_env: [OPENCODE_GO_API_KEY]

    # ── Kilo Code ────────────────────────────────────────────────────
    - id: kilocode/*
      name: Kilo Code (set model per workspace)
      required_env: [KILOCODE_API_KEY]

    # ── OpenRouter catch-all ─────────────────────────────────────────
    - id: openrouter/*
      name: Any OpenRouter model (200+ available)
      required_env: [OPENROUTER_API_KEY]

    # ── Custom endpoint (LM Studio / Ollama local / vLLM / llama.cpp) ─
    - id: custom/*
      name: Self-hosted OpenAI-compat endpoint (configure base_url in ~/.hermes/config)
      required_env: []

  # No single required env — hermes-agent supports 20+ providers and
  # customers pick any one via the canvas Config tab (per-model
  # required_env above drives the real UX). Molecule-runtime's
  # preflight enforces AND-semantics on this list, so a non-empty
  # value here would block workspaces using any non-default provider.
  # hermes-agent itself errors loud at request time if zero providers
  # are configured — that's the safety net.
  required_env: []

  # 0 = no timeout; hermes-agent sessions can run long when tool-using.
  timeout: 0

  # Cold-boot expectation surfaced to the canvas ProvisioningTimeout
  # banner (Molecule-AI/molecule-core#2054). Hermes installs ripgrep +
  # ffmpeg + node22 + builds hermes-agent from source + pulls Playwright
  # + Chromium (~300MB), so cold boots routinely land at 8-13 min on
  # staging EC2. 720s aligns with the SaaS E2E PROVISION_TIMEOUT_SECS=900
  # so the UI warning surfaces shortly before the backend itself gives
  # up. Without this declaration, canvas falls back to its 2-min default
  # and false-alarms on every fresh hermes provision.
  provision_timeout_seconds: 720

# Tools hermes-agent ships natively. See `hermes tools` inside the
# container for the interactive toggle — by default all 17 built-in
# tool families are available (terminal, file read/write/edit,
# web fetch+search, memory, skills, subagent spawn, etc.).
skills: []

a2a:
  port: 8000
  streaming: true
  push_notifications: true

# Bridge config — consumed by executor.py and start.sh.
bridge:
  # Where the in-container hermes-agent API server listens. Do NOT
  # change unless you also change start.sh / API_SERVER_PORT.
  hermes_api_base: http://127.0.0.1:8642/v1
  # Bearer token is injected by start.sh as API_SERVER_KEY and read by
  # executor.py from the env at request time — not stored in config.
  hermes_api_key_env: API_SERVER_KEY
  # Optional: force a specific hermes provider instead of relying on
  # hermes-agent's `auto` detection. Useful when multiple keys are
  # set and you want deterministic routing. Set via HERMES_INFERENCE_PROVIDER
  # env on the container OR hardcode here. Valid values: see
  # docs/CONFIGURATION.md#provider-matrix.
  provider: ""

delegation:
  retry_attempts: 3
  retry_delay: 5
  timeout: 120
  escalate: true

template_schema_version: 1

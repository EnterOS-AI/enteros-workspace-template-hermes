name: upstream-sync

# Daily hermes freshness bot (2026-07-22, principal directive: "keep at least
# once a day sync so everything is up to date").
#
# SIMPLIFIED after the fork retirement (same day): the effective hermes is now
# the stock upstream wheel pinned as HERMES_VERSION in the Dockerfile, so
# "sync" is just: check PyPI for a newer hermes-agent release and open a bump
# PR. The old fork-merge + conflict-flag machinery (molecule-ai/hermes-agent,
# feat/platform-adapter-plugins) is gone with the fork — upstream #17751
# provides the plugin socket and the A2A plugin registers through it.
#
# NOT a scheduled CI gate: molecule-core's zero-cron ratchet forbids
# timer-driven TEST runs; this job runs no tests and gates nothing — bump PRs
# go through the normal per-PR CI (image build + prebake self-check + adapter
# socket conformance), and humans/agents gate the merge, same contract as the
# runtime .runtime-version propagate bot.
#
# Idempotent: skips when the pin already matches, when the sync branch already
# exists, or when a bump PR is already open. PRs are opened purely via the
# Gitea contents+pulls API (no git clone, so the bot token never lands in an
# on-disk clone URL).
#
# AUTH: RUNTIME_BOT_TOKEN from the Infisical SSOT (/shared/runtime-bot).
# Absent bootstrap creds degrade to report-only; present-but-broken fetch
# fails loudly.

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app

permissions:
  contents: read

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Check PyPI for a newer hermes-agent and open a bump PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch RUNTIME_BOT_TOKEN from Infisical SSOT
        env:
          INFISICAL_CI_CLIENT_ID: ${{ secrets.INFISICAL_CI_CLIENT_ID }}
          INFISICAL_CI_CLIENT_SECRET: ${{ secrets.INFISICAL_CI_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_CI_PROJECT_ID }}
        run: |
          set -uo pipefail
          if [ -z "${INFISICAL_CI_CLIENT_ID:-}" ] || [ -z "${INFISICAL_CI_CLIENT_SECRET:-}" ] || [ -z "${INFISICAL_PROJECT_ID:-}" ]; then
            echo "::warning::INFISICAL_CI_* bootstrap creds absent; sync degrades to report-only."
            exit 0
          fi
          BASE="https://key.moleculesai.app"
          TOK=$(curl -fsS -X POST "$BASE/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"clientId\":\"$INFISICAL_CI_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CI_CLIENT_SECRET\"}" \
            | python3 -c 'import sys,json;d=json.load(sys.stdin);v=d.get("accessToken");print(v if isinstance(v,str) and v else "")')
          if [ -z "${TOK}" ]; then
            echo "::error::Infisical universal-auth login failed with creds present — real infra fault." >&2
            exit 1
          fi
          BOT=$(curl -fsS "$BASE/api/v3/secrets/raw/RUNTIME_BOT_TOKEN?workspaceId=$INFISICAL_PROJECT_ID&environment=prod&secretPath=%2Fshared%2Fruntime-bot" \
            -H "Authorization: Bearer $TOK" \
            | python3 -c 'import sys,json;d=json.load(sys.stdin);v=(d.get("secret") or {}).get("secretValue");print(v if isinstance(v,str) and v else "")')
          if [ -z "${BOT}" ]; then
            echo "::error::Infisical returned empty RUNTIME_BOT_TOKEN at /shared/runtime-bot — failing loudly." >&2
            exit 1
          fi
          echo "::add-mask::$BOT"
          echo "BOT_TOKEN=$BOT" >> "$GITHUB_ENV"

      - name: Compare PyPI latest against the Dockerfile pin; open bump PR
        env:
          BOT_TOKEN: ${{ env.BOT_TOKEN }}
          API: ${{ env.GITHUB_SERVER_URL }}/api/v1
          REPO: molecule-ai/molecule-ai-workspace-template-hermes
        run: |
          set -euo pipefail
          LATEST=$(curl -fsS --max-time 30 https://pypi.org/pypi/hermes-agent/json \
            | python3 -c 'import sys,json;print(json.load(sys.stdin)["info"]["version"])')
          CURRENT=$(sed -n 's/^ARG HERMES_VERSION=//p' Dockerfile | head -1)
          echo "pypi latest=$LATEST pinned=$CURRENT"
          if [ -z "$LATEST" ] || [ -z "$CURRENT" ]; then
            echo "::error::could not resolve versions (latest='$LATEST' pinned='$CURRENT')"; exit 1
          fi
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "pin is current — nothing to do"; exit 0
          fi
          if [ -z "${BOT_TOKEN:-}" ]; then
            echo "::warning::report-only (no BOT_TOKEN): hermes-agent $CURRENT -> $LATEST bump needed."
            exit 0
          fi
          python3 - "$LATEST" "$CURRENT" <<'PYEOF'
          import base64, json, os, sys, urllib.request

          latest, current = sys.argv[1], sys.argv[2]
          api = os.environ["API"]; repo = os.environ["REPO"]
          tok = os.environ["BOT_TOKEN"]
          branch = f"sync/hermes-{latest}"

          def req(method, path, body=None):
              r = urllib.request.Request(
                  f"{api}{path}", method=method,
                  data=json.dumps(body).encode() if body is not None else None,
                  headers={"Authorization": f"token {tok}",
                           "Content-Type": "application/json",
                           # Cloudflare bot-fight bans urllib's default UA
                           # at the edge (error 1010) — spoof the fleet's
                           # standard curl UA (see sync-providers-yaml.yml).
                           "User-Agent": "curl/8.4.0"})
              try:
                  with urllib.request.urlopen(r) as resp:
                      return resp.status, json.load(resp)
              except urllib.error.HTTPError as e:
                  return e.code, {}

          st, _ = req("GET", f"/repos/{repo}/branches/{branch}")
          if st == 200:
              print(f"branch {branch} already exists — skipping"); sys.exit(0)
          # Stale-PR handling (review wf_7cb5003d #10): an open bump PR for
          # the SAME version means a previous tick already surfaced this
          # bump — skip. An open bump PR for an OLDER version must NOT
          # block newer releases forever (a red/unreviewed 0.19.1 PR would
          # otherwise stall a 0.19.2 security fix indefinitely): close it
          # with a comment and fall through to open the fresh one.
          st, prs = req("GET", f"/repos/{repo}/pulls?state=open")
          for p in (prs if isinstance(prs, list) else []):
              ref = p.get("head", {}).get("ref", "")
              if not ref.startswith("sync/hermes-"):
                  continue
              if ref == branch:
                  print("bump PR for this version already open — skipping"); sys.exit(0)
              num = p.get("number")
              req("POST", f"/repos/{repo}/issues/{num}/comments", {
                  "body": f"Superseded by a newer upstream release ({latest}); closing so the daily sync can surface it.",
              })
              st, _ = req("PATCH", f"/repos/{repo}/pulls/{num}", {"state": "closed"})
              print(f"closed stale bump PR #{num} ({ref}) -> {st}")
              req("DELETE", f"/repos/{repo}/branches/{ref}")

          st, meta = req("GET", f"/repos/{repo}/contents/Dockerfile?ref=main")
          assert st == 200, f"contents GET {st}"
          text = base64.b64decode(meta["content"]).decode()
          needle = f"ARG HERMES_VERSION={current}"
          assert text.count(needle) == 1, "pin line not found exactly once"
          text = text.replace(needle, f"ARG HERMES_VERSION={latest}")

          st, _ = req("PUT", f"/repos/{repo}/contents/Dockerfile", {
              "message": f"chore(sync): bump hermes-agent {current} -> {latest} (daily upstream sync)",
              "content": base64.b64encode(text.encode()).decode(),
              "sha": meta["sha"], "branch": "main", "new_branch": branch,
          })
          assert st in (200, 201), f"contents PUT {st}"

          st, pr = req("POST", f"/repos/{repo}/pulls", {
              "title": f"chore(sync): bump hermes-agent {current} -> {latest}",
              "head": branch, "base": "main",
              "body": ("Automated daily upstream sync: PyPI reports "
                       f"hermes-agent {latest} (pinned: {current}). Per-PR "
                       "CI (image build + prebake self-check + adapter "
                       "socket conformance) gates the merge as usual."),
          })
          assert st in (200, 201), f"pulls POST {st}"
          print(f"opened bump PR #{pr.get('number')} for hermes-agent {latest}")
          PYEOF

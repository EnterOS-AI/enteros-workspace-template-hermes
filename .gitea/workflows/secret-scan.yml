# Canonical inline diff secret gate. The workflow/job names preserve the
# established `Secret scan / Scan diff for credential-shaped strings` context.

name: Secret scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  scan:
    name: Scan diff for credential-shaped strings
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      MOLECULE_CI_REF: ce4f84f1c9851c3ee6a49a8d9862934dd9965c44
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2
      - name: Fetch immutable molecule-ci scanner
        run: |
          git init -q .molecule-ci
          git -C .molecule-ci remote add origin \
            https://git.moleculesai.app/molecule-ai/molecule-ci.git
          git -C .molecule-ci fetch -q --depth 1 origin "$MOLECULE_CI_REF"
          git -C .molecule-ci checkout -q --detach FETCH_HEAD
          test "$(git -C .molecule-ci rev-parse HEAD)" = "$MOLECULE_CI_REF"
      - name: Scan exact changed content with fail-closed tree fallback
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -o pipefail
          if [ "${{ github.event_name }}" = pull_request ]; then
            BASE=$PR_BASE_SHA
            HEAD=$PR_HEAD_SHA
          else
            BASE=$PUSH_BEFORE
            HEAD=$PUSH_AFTER
          fi
          python3 .molecule-ci/scripts/scan_diff_secrets.py \
            --repo-root . --base "$BASE" --head "$HEAD" \
            | tee /tmp/secret-scan.log
      - name: Assert scanner execution sentinel
        if: always()
        run: grep -qxF 'secret-scan:sentinel:executed' /tmp/secret-scan.log
